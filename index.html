<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Escape Room Matemàtic</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: black;
    background-image: url("https://media.tenor.com/KnRHNwnmhOsAAAAC/bajo-la-lluvia.gif");
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

h1 {
    margin-bottom: 20px;
    background: rgba(0, 0, 0, 0.85);
    padding: 10px 30px;
    border-radius: 10px;
}

#game {
    background: rgba(0, 0, 0, 0.85);
    padding: 30px;
    border-radius: 15px;
    min-width: 350px;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    background: #333;
    color: white;
    border: 1px solid #555;
}

button:hover {
    background: #555;
}

#menuBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #222;
}

#menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.95);
    padding: 30px;
    display: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<button id="menuBtn" onclick="obrirMenu()">☰</button>

<h1>🔐 Escape Room Matemàtic</h1>
<div id="game"></div>

<div id="menu">
    <h2>📋 MENÚ</h2>
    <button onclick="reiniciarTot()">Reiniciar des de zero</button><br>
    <button onclick="reiniciarCheckpoint()">Reiniciar checkpoint actual</button><br>
    <button onclick="tancarMenu()">Continuar partida</button>
</div>

<script>

let checkpointActual = 0;
let preguntaActual = 0;
let codiFinal = "";
let errorsCheckpoint = false;

const checkpoints = [
{
digit: "3",
preguntes: [
["Quins usos donem als nombres?", ["Comptar (persones, objectes, diners…)","Decoració","Dormir"], 0],
["El 0 representa una quantitat?", ["Sí","No","Depèn"], 0]
],
final: ["0+8?", "8"]
}
];

function barrejar(array) {
    return array.sort(() => Math.random() - 0.5);
}

function mostrarPregunta() {
    if (preguntaActual >= checkpoints[checkpointActual].preguntes.length) {
        mostrarFinal();
        return;
    }

    let p = checkpoints[checkpointActual].preguntes[preguntaActual];
    let opcionsBarrejades = barrejar([...p[1]]);
    let correctaText = p[1][p[2]];

    let html = `<h2>🔹 Checkpoint ${checkpointActual+1}</h2>`;
    html += `<p>${p[0]}</p>`;

    opcionsBarrejades.forEach(op => {
        html += `<button onclick="respondre('${op}', '${correctaText}')">${op}</button><br>`;
    });

    document.getElementById("game").innerHTML = html;
}

function respondre(seleccionada, correcta) {

    if (seleccionada !== correcta) {
        errorsCheckpoint = true;
    }

    preguntaActual++;
    mostrarPregunta();
}

function mostrarFinal() {
    let pregunta = checkpoints[checkpointActual].final[0];
    document.getElementById("game").innerHTML =
    `<h2>Pregunta final</h2>
     <p>${pregunta}</p>
     <input id="resFinal">
     <br><br>
     <button onclick="validarFinal()">Confirmar</button>`;
}

function validarFinal() {

    let resposta = document.getElementById("resFinal").value;

    if (resposta !== checkpoints[checkpointActual].final[1] || errorsCheckpoint) {
        document.getElementById("game").innerHTML =
        `<h2>❌ Alguna pregunta està malament!</h2>
         <p>Reiniciant checkpoint...</p>`;
        setTimeout(reiniciarCheckpoint, 2500);
        return;
    }

    codiFinal += checkpoints[checkpointActual].digit;
    checkpointActual++;
    preguntaActual = 0;
    errorsCheckpoint = false;

    document.getElementById("game").innerHTML =
    `<h2>✅ Checkpoint superat!</h2>`;
}

function reiniciarTot() {
    checkpointActual = 0;
    preguntaActual = 0;
    codiFinal = "";
    errorsCheckpoint = false;
    tancarMenu();
    mostrarPregunta();
}

function reiniciarCheckpoint() {
    preguntaActual = 0;
    errorsCheckpoint = false;
    tancarMenu();
    mostrarPregunta();
}

function obrirMenu() {
    document.getElementById("menu").style.display = "block";
}

function tancarMenu() {
    document.getElementById("menu").style.display = "none";
}

mostrarPregunta();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Escape Room Matemàtic</title>
<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding: 20px;
}
button {
    padding: 10px 20px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
}
#menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #222;
    padding: 20px;
    display: none;
}
.hidden { display: none; }
</style>
</head>
<body>

<h1>🔐 Escape Room Matemàtic</h1>
<div id="game"></div>

<div id="menu">
    <h2>📋 MENÚ</h2>
    <button onclick="reiniciarTot()">Reiniciar des de zero</button>
    <button onclick="reiniciarCheckpoint()">Reiniciar checkpoint actual</button>
    <button onclick="tancarMenu()">Continuar</button>
</div>

<script>

let checkpointActual = 0;
let preguntaActual = 0;
let respostesCorrectes = 0;
let codiFinal = "";

const checkpoints = [

/* ---------------- CHECKPOINT 1 ---------------- */
{
digit: "3",
preguntes: [
["Què és un nombre?", ["Una lletra","Una quantitat o idea matemàtica","Un color"], 1],
["El 0 representa una quantitat?", ["Sí","No","Depèn"], 0],
["Per què els nombres són infinits?", ["Perquè s'acaben","Perquè sempre en podem sumar 1","Perquè són màgics"], 1]
],
final: ["0 + 8 =", "8"]
},

/* ---------------- CHECKPOINT 2 ---------------- */
{
digit: "7",
preguntes: [
["| -9 | =", ["-9","9","0"], 1],
["Quin és el valor absolut de 5?", ["5","-5","0"], 0],
["El valor absolut sempre és...", ["Negatiu","Positiu o zero","Fraccionari"], 1]
],
final: ["| -12 | =", "12"]
},

/* ---------------- CHECKPOINT 3 ---------------- */
{
digit: "4",
preguntes: [
["Quin és el MCM de 3 i 4?", ["7","12","24"], 1],
["El 11 és nombre...", ["Compost","Primer","Parell"], 1],
["Si un nombre acaba en 0 és divisible per...", ["2","5 i 10","3"], 1]
],
final: ["MCD de 8 i 12 =", "4"]
},

/* ---------------- CHECKPOINT 4 (FRACCIONS) ---------------- */
{
digit: "9",
preguntes: [
["Què indica el denominador?", ["Parts que agafem","Parts totals","Resultat"], 1],
["3/3 és...", ["Pròpia","Impròpia","Equivalent a la unitat"], 2],
["Per simplificar usem el...", ["MCM","MCD","Valor absolut"], 1]
],
final: ["2/3 + 1/3 =", "1"]
},

/* ---------------- CHECKPOINT 5 (PROPORCIONALITAT) ---------------- */
{
digit: "6",
preguntes: [
["Si 2 llibretes costen 4€, quant costen 6?", ["8€","12€","10€"], 1],
["Relació proporcional directa: si una puja...", ["L'altra baixa","No canvia","També puja"], 2],
["Si 4 kg valen 8€, preu per kg?", ["2€","4€","8€"], 0]
],
final: ["Si 3 bolígrafs costen 9€, quant costen 15?", "45"]
}

];

function barrejar(array) {
    return array.sort(() => Math.random() - 0.5);
}

function mostrarPregunta() {

    if (preguntaActual >= checkpoints[checkpointActual].preguntes.length) {
        mostrarFinal();
        return;
    }

    let p = checkpoints[checkpointActual].preguntes[preguntaActual];
    let opcionsBarrejades = barrejar([...p[1]]);
    let correctaText = p[1][p[2]];

    let html = `<h2>🔹 Checkpoint ${checkpointActual+1}</h2>`;
    html += `<p>${p[0]}</p>`;

    opcionsBarrejades.forEach(op => {
        html += `<button onclick="respondre('${op}', '${correctaText}')">${op}</button><br>`;
    });

    document.getElementById("game").innerHTML = html;
}

function respondre(seleccionada, correcta) {
    if (seleccionada === correcta) {
        respostesCorrectes++;
    }
    preguntaActual++;
    mostrarPregunta();
}

function mostrarFinal() {

    if (respostesCorrectes === checkpoints[checkpointActual].preguntes.length) {
        let pregunta = checkpoints[checkpointActual].final[0];
        document.getElementById("game").innerHTML =
        `<h2>Pregunta final</h2>
         <p>${pregunta}</p>
         <input id="resFinal">
         <button onclick="validarFinal()">Confirmar</button>`;
    } else {
        document.getElementById("game").innerHTML =
        `<h2>Alguna pregunta d'aquest checkpoint està malament.</h2>`;
        setTimeout(reiniciarCheckpoint, 2000);
    }
}

function validarFinal() {
    let resposta = document.getElementById("resFinal").value;
    if (resposta === checkpoints[checkpointActual].final[1]) {
        codiFinal += checkpoints[checkpointActual].digit;
        checkpointActual++;
        preguntaActual = 0;
        respostesCorrectes = 0;

        if (checkpointActual >= checkpoints.length) {
            document.getElementById("game").innerHTML =
            `<h1>🏆 HAS ESCAPAT!</h1>
             <h2>Codi final: ${codiFinal}</h2>`;
        } else {
            mostrarPregunta();
        }
    }
}

function reiniciarTot() {
    checkpointActual = 0;
    preguntaActual = 0;
    respostesCorrectes = 0;
    codiFinal = "";
    tancarMenu();
    mostrarPregunta();
}

function reiniciarCheckpoint() {
    preguntaActual = 0;
    respostesCorrectes = 0;
    tancarMenu();
    mostrarPregunta();
}

function tancarMenu() {
    document.getElementById("menu").style.display = "none";
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        document.getElementById("menu").style.display = "block";
    }
});

mostrarPregunta();

</script>
</body>
</html>

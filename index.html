<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Escape Room Matemàtic</title>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}
button {
    padding: 10px 20px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
}
#menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #222;
    padding: 20px;
    display: none;
    z-index: 1000;
}
#timer {
    font-size: 20px;
    margin-bottom: 20px;
}
</style>
</head>
<body>

<h1>🔐 Escape Room Matemàtic</h1>
<div id="timer">Temps restant: 10:00</div>
<div id="game"></div>

<div id="menu">
    <h2>📋 MENÚ</h2>
    <button onclick="reiniciarTot()">Reiniciar des de zero</button>
    <button onclick="reiniciarCheckpoint()">Reiniciar checkpoint actual</button>
    <button onclick="tancarMenu()">Continuar partida</button>
</div>

<script>
let checkpointActual = 0;
let preguntaActual = 0;
let respostesCorrectes = 0;
let codiFinal = "";
let tempsGlobal = 10 * 60; // 10 minuts per tot el joc
let temporitzador;

const checkpoints = [ /* Aquí va tot l'array dels 5 checkpoints amb preguntes igual que abans */ ];

// TEMPORIZADOR GLOBAL
function iniciarTemporitzador() {
    clearInterval(temporitzador);
    document.getElementById("timer").textContent = formatTemps(tempsGlobal);
    temporitzador = setInterval(() => {
        tempsGlobal--;
        document.getElementById("timer").textContent = formatTemps(tempsGlobal);
        if (tempsGlobal <= 0) {
            clearInterval(temporitzador);
            alert("S'ha acabat el temps! Es reinicia l'escape room.");
            reiniciarTot();
        }
    }, 1000);
}

function formatTemps(segons) {
    let m = Math.floor(segons / 60);
    let s = segons % 60;
    return `Temps restant: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// FUNCIONS JOC
function barrejar(array) { return array.sort(() => Math.random() - 0.5); }

function mostrarPregunta() {
    if (preguntaActual >= checkpoints[checkpointActual].preguntes.length) {
        mostrarFinal();
        return;
    }
    let p = checkpoints[checkpointActual].preguntes[preguntaActual];
    let opcionsBarrejades = barrejar([...p[1]]);
    let correctaText = p[1][p[2]];
    let html = `<h2>🔹 Checkpoint ${checkpointActual+1}</h2>`;
    html += `<p>${p[0]}</p>`;
    opcionsBarrejades.forEach(op => {
        html += `<button onclick="respondre('${op}', '${correctaText}')">${op}</button><br>`;
    });
    document.getElementById("game").innerHTML = html;
}

function respondre(seleccionada, correcta) {
    if (seleccionada === correcta) { respostesCorrectes++; }
    preguntaActual++;
    mostrarPregunta();
}

function mostrarFinal() {
    if (respostesCorrectes === checkpoints[checkpointActual].preguntes.length) {
        let pregunta = checkpoints[checkpointActual].final[0];
        document.getElementById("game").innerHTML =
        `<h2>Pregunta final</h2>
         <p>${pregunta}</p>
         <input id="resFinal">
         <button onclick="validarFinal()">Confirmar</button>`;
    } else {
        document.getElementById("game").innerHTML =
        `<h2>Alguna pregunta d'aquest checkpoint està malament.</h2>`;
        setTimeout(reiniciarCheckpoint, 2000);
    }
}

function validarFinal() {
    let resposta = document.getElementById("resFinal").value;
    if (resposta === checkpoints[checkpointActual].final[1]) {
        codiFinal += checkpoints[checkpointActual].digit;
        checkpointActual++;
        preguntaActual = 0;
        respostesCorrectes = 0;
        if (checkpointActual >= checkpoints.length) {
            clearInterval(temporitzador);
            document.getElementById("game").innerHTML =
            `<h1>🏆 HAS ESCAPAT!</h1>
             <h2>Codi final: ${codiFinal}</h2>`;
        } else {
            mostrarPregunta();
        }
    }
}

function reiniciarTot() {
    checkpointActual = 0;
    preguntaActual = 0;
    respostesCorrectes = 0;
    codiFinal = "";
    tempsGlobal = 10 * 60;
    tancarMenu();
    iniciarTemporitzador();
    mostrarPregunta();
}

function reiniciarCheckpoint() {
    preguntaActual = 0;
    respostesCorrectes = 0;
    tancarMenu();
    mostrarPregunta();
}

function tancarMenu() {
    document.getElementById("menu").style.display = "none";
}

document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        document.getElementById("menu").style.display = "block";
    }
});

// Inici automàtic
iniciarTemporitzador();
mostrarPregunta();
</script>
</body>
</html>
